name: 打包发票合并工具

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: 创建 Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: 发票合并工具 ${{ github.ref_name }}
          draft: true

  build-windows:
    runs-on: windows-latest
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 压缩
        run: Compress-Archive -Path "dist/发票合并工具/*" -DestinationPath "invoice-merge-tool-Windows.zip"
        shell: pwsh

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-merge-tool-Windows
          path: invoice-merge-tool-Windows.zip

      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: invoice-merge-tool-Windows.zip

  build-macos:
    runs-on: macos-latest
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: python build.py

      - name: 压缩
        run: cd dist && zip -r ../invoice-merge-tool-macOS.zip 发票合并工具/

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-merge-tool-macOS
          path: invoice-merge-tool-macOS.zip

      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: invoice-merge-tool-macOS.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 发布 Release（取消 draft）
        uses: softprops/action-gh-release@v2
        with:
          draft: false
